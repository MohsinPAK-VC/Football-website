<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football World</title>
    <style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}        

body{
    background:linear-gradent(to bottom,#0b6623,#14532d);
    color:white;
    overflow-x:hidden;
}

header{
    text-align:center;
    paadding:60px 20px;

}

header h1{
    font-size:55px;
    animation:fadeDown 1.2s ease;

}

header p{
    margin-top:15px;
    font-size:20px;
    color:#ddd;
    animation:fadeUp 1.5s ease;

}

.btn{
    display:inline-block;
    margin-top: 25px;
    padding:14px 30px;
    background:#fff;
    color:#14532d;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
    transition:.3s;

}

.btn:hover{
    transform:scale(1.08);
    background: #ffd700;

}

.ball{
    font-size: 70px;
    text-align: center;
}

section{
    padding: 60px 20px;

}

.cards{
    display:flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

.card{
    width:280px;
    background:rgba(255,255,255, .12);
    backdrop-filter:blur(6px);
    border-radius: 18px;
    padding:25px;
    transition:.4s;


}
.card:hover{
    transform:translateY(-10px);
    background: rgba(255,255,255, .2);

}
.card h2{
    margin-bottom:12px;

}
footer{
    text-align: center;
    padding:25px;
    background: #0d3f1f;

}

@keyframes bounce{
    0%,100%{
        transform: translateY(0);

    }
    50%{
        transform:translateY(-20px);

    }
}

@keyframes fadeDown{
    from{
        opacity: 0;
        transform:translateY(-40px);
        }
    to{
        opacity: 1;
        transform: translateY(0)
    }
}
